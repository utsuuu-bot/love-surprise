<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Question</title>

<style>

body{
background:#ffc0cb;
font-family:Arial;
text-align:center;
padding-top:150px;
}

h1{
font-size:40px;
color:#ff1493;
}

button{
padding:15px 30px;
font-size:20px;
border:none;
border-radius:20px;
cursor:pointer;
margin:20px;
}

#yes{
background:#ff69b4;
color:white;
}

#no{
background:#ff1493;
color:white;
position:absolute;
}

</style>

</head>

<body>

<h1>Will you be my girlfriend? 💖</h1>

<button id="yes" onclick="nextPage()">Yes 💘</button>
<button id="no">No 😢</button>

<script>

const noButton = document.getElementById("no");

document.addEventListener("mousemove", function(e){

let x = Math.random() * window.innerWidth;
let y = Math.random() * window.innerHeight;

noButton.style.left = x + "px";
noButton.style.top = y + "px";

});

function nextPage(){
window.location.href="yes.html";
}

</script>

</body>
</html>
